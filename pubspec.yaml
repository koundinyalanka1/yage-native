name: retropal
description: "RetroPal - Your retro gaming companion. A GBA/GB/GBC emulator powered by mGBA."
publish_to: 'none'
version: 24.0.0+24

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.2.0
  path_provider: ^2.1.6
  file_picker: ^12.0.0-beta.7
  shared_preferences: ^2.5.5
  sqflite: ^2.4.3
  sqflite_common_ffi: ^2.4.2
  provider: ^6.1.5+1
  path: ^1.9.1
  collection: ^1.19.1
  http: ^1.6.0
  wakelock_plus: ^1.6.1
  archive: ^4.0.9
  share_plus: ^13.1.0
  google_sign_in: ^7.2.0
  googleapis: ^16.0.0
  extension_google_sign_in_as_googleapis_auth: ^3.0.0
  firebase_core: ^4.11.0
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4
  google_mobile_ads: ^9.0.0
  flutter_secure_storage: ^10.3.1
  crypto: ^3.0.7
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  package_info_plus: ^10.1.0
  in_app_purchase: ^3.3.0
  in_app_purchase_android: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
    - native/mupen64plus.ini
    # OpenBIOS — GPLv2, free fallback PS1 BIOS bundled for Google-Play
    # compliant launch when the user has not supplied a Sony BIOS. Generated
    # by scripts/fetch_libretro_cores.{ps1,sh}; this entry is required so the
    # asset is included even if the file is .gitignored.
    - assets/system/
